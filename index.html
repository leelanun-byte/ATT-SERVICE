<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATT-SERVICE | เข้าสู่ระบบ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0e1a24;
    --bg-grid: #14263380;
    --panel: #16273a;
    --line: #2e4a61;
    --line-strong: #3f6a89;
    --blue: #4fa8e0;
    --blue-bright: #7ec4ef;
    --text: #eaf2f8;
    --muted: #7f9cb3;
    --red: #e05c5c;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    font-family:'IBM Plex Sans Thai','IBM Plex Mono',sans-serif;
    background-color: var(--bg);
    background-image:
      linear-gradient(var(--bg-grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
    background-size: 28px 28px;
    color: var(--text);
    min-height: 100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 20px;
  }
  .sheet{
    width: 100%;
    max-width: 380px;
    border: 1.5px solid var(--line-strong);
    background: linear-gradient(180deg, #101f2b 0%, #0e1a24 100%);
    position: relative;
    padding: 34px 30px;
  }
  .sheet::before{
    content:"";
    position:absolute; inset:8px;
    border: 1px solid var(--line);
    pointer-events:none;
  }
  .corner{ position:absolute; width:14px; height:14px; z-index:2; }
  .corner.tl{ top:-1px; left:-1px; border-top:2px solid var(--blue-bright); border-left:2px solid var(--blue-bright); }
  .corner.tr{ top:-1px; right:-1px; border-top:2px solid var(--blue-bright); border-right:2px solid var(--blue-bright); }
  .corner.bl{ bottom:-1px; left:-1px; border-bottom:2px solid var(--blue-bright); border-left:2px solid var(--blue-bright); }
  .corner.br{ bottom:-1px; right:-1px; border-bottom:2px solid var(--blue-bright); border-right:2px solid var(--blue-bright); }

  .label-row{
    font-family:'IBM Plex Mono',monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--blue);
    text-transform: uppercase;
    margin-bottom: 10px;
    text-align:center;
  }
  h1{
    font-family:'IBM Plex Mono',monospace;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 1px;
    text-align:center;
  }
  h1 span{ color: var(--blue-bright); }
  .subtitle{
    color: var(--muted);
    font-size: 13px;
    margin-top: 6px;
    text-align:center;
    margin-bottom: 26px;
  }
  label{
    display:block;
    font-family:'IBM Plex Mono',monospace;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
    margin-top: 16px;
  }
  label:first-of-type{ margin-top:0; }
  input{
    width:100%;
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--text);
    font-family:'IBM Plex Mono',monospace;
    font-size: 15px;
    letter-spacing: 1px;
    padding: 12px 14px;
    outline:none;
    transition: border-color .15s;
  }
  input:focus{ border-color: var(--blue); }
  button{
    width:100%;
    margin-top: 20px;
    background: var(--blue);
    border: 1px solid var(--blue);
    color: #06141d;
    font-family:'IBM Plex Mono',monospace;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-size: 13px;
    padding: 12px;
    cursor:pointer;
    transition: background .15s;
  }
  button:hover{ background: var(--blue-bright); border-color: var(--blue-bright); }
  .error{
    color: var(--red);
    font-family:'IBM Plex Mono',monospace;
    font-size: 12px;
    text-align:center;
    margin-top: 14px;
    display:none;
  }
  .error.show{ display:block; }
  footer{
    text-align:center;
    padding-top: 22px;
    font-family:'IBM Plex Mono',monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="sheet">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <div class="label-row">RESTRICTED ACCESS</div>
    <h1>ATT<span>-</span>SERVICE</h1>
    <div class="subtitle">เข้าสู่ระบบเพื่อใช้งานเครื่องมือ</div>

    <label for="username">ชื่อผู้ใช้</label>
    <input id="username" type="text" placeholder="username" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false">

    <label for="pw">รหัสผ่าน</label>
    <input id="pw" type="password" placeholder="••••••••" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false">

    <button id="enter">เข้าสู่ระบบ</button>
    <div class="error" id="err">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</div>

    <footer>© 2026 ATT-SERVICE — ENGINEERING TOOLKIT</footer>
  </div>

<script>
  // รายชื่อผู้ใช้ที่อนุญาต — เพิ่ม/ลบ/แก้ไขได้ในนี้เลย
  // วิธีสร้าง hash รหัสผ่านใหม่: เปิด Console เบราว์เซอร์ แล้วพิมพ์
  // crypto.subtle.digest('SHA-256', new TextEncoder().encode('รหัสผ่านที่ต้องการ')).then(b=>console.log(Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')))
  const USERS = {
    "admin":     "72bce3f825ec2d0edaffb18554e60985e66b7291ab3c4aec9f34a89c42b7363e", // Truss6763!
    "engineer1": "0c355a42beb4c0f7b7b02d5ca0d464398c097611843579eba1d44a72d1fdb071"  // Sheet2448!
  };

  async function sha256(text){
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function tryLogin(){
    const uname = document.getElementById('username').value.trim();
    const pw = document.getElementById('pw').value;
    const hash = await sha256(pw);
    if(USERS[uname] && USERS[uname] === hash){
      sessionStorage.setItem('att_auth','1');
      sessionStorage.setItem('att_user', uname);
      window.location.href = 'portal.html';
    } else {
      document.getElementById('err').classList.add('show');
    }
  }

  document.getElementById('enter').addEventListener('click', tryLogin);
  document.querySelectorAll('input').forEach(el => {
    el.addEventListener('keydown', (e) => { if(e.key === 'Enter') tryLogin(); });
  });
</script>
</body>
</html>
